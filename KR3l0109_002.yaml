body:
  text: 劇談錄卷下唐康駢撰劉相國宅通義坊劉相國宅本文宗朝朔方節度使李進賢舊第進賢起自戎旅而倜儻瑰瑋累居藩翰富于財寳雖豪侈奉身雅好賔客有中朝宿德常話在名塲日失意邊遊進賢接納甚至其後京華相遇時亦造其門屬牡丹盛開因以賞花為名及期而往㕔事備陳飲饌宴席之間已非尋常舉杯數廵復引衆賔歸内室宇華麗楹柱皆設錦繡列筵甚廣器用悉是黄金堦前有花數叢覆以錦幄妓妾俱服紈綺執絲簧善歌舞者至多客之左右皆有女僕雙鬟者二人所須無不必至承接之意常日指使者不如芳酒綺肴窮極水陸至於僕乗供給靡不豐盈自午迄於眀晨不覩杯盤狼籍朝士云邇後歴觀豪貴之屬筵席臻此者甚稀厥後進賢徙居長興其宅互為他人所有咸通中劉相國罷北京亞尹復為翰林學士數歲後自承㫖入相尚以十千税焉及出鎮荆南朝野無不惋惜都城士庶以少及長聞之俱為涕泣其後興化蕭相登庸舉為自代表云正人吞聲而扼腕百姓掩淚於道途是時昇道鄭相國在内廷夜草麻制具述其事云安數畝之居仍非已有却四方之賂惟畏人知是時都下傳寫為之紙貴持權者覩其詞大怒鄭公自翰林承㫖左遷梧州相國自端溪竄於日南謫居四年方獲清雪以秘書監召還未久復持鈞軸或將甲第為獻竟無所受復於此宅寓居庭宇不加修餙清風儉徳充塞寰宇君子曰仁義之感物也大哉劉公知帝道欽明欲賢人盡舉四海之内翕然嚮風雖謫居累年再昇鼎餁姦邪之口不能掩其善魑魅之域不能陷其身振譽一時流芳千載豈不偉歟其有冐官爵叨貨賄怙寵專權身存名滅者一何謬哉李相國宅朱崖李相國德裕宅在安邑坊東南隅桑道茂謂為玉椀舍宇不甚宏侈而制度奇巧其間怪石古松儼若圖畫在文宗武宗朝方秉化權威勢與恩澤無比每好捜掇殊異朝野歸附者多求寶玩獻之嘗因暇日休澣邀同列宰相及朝士宴語時畏景赫曦咸有鬱蒸之病軒葢候門已及亭午搢紳名士交扇不暇將期憩息於清凉之所既而延於小齋不甚高敞四壁施設皆古書名畫俱有炎爍之慮及别列坐開樽煩暑都盡良久覺清飈爽氣凜若髙秋備設酒肴及昏而罷出户則火雲烈日熇然焦灼有好事者求親信問之云此日唯以金盆貯水漬白龍皮置於座末龍皮有新羅僧得自海中云海旁有居者得之於漁扈其初以為鱗介之屬曾有老人見而識之僧知相國好奇因以金帛贖之而獻又煖金𢃄辟塵簪皆希代之寳及南遷悉為惡溪沉溺使崑崙沒水求之在鰐魚穴不能取平泉莊去洛城三十里卉木臺榭若造仙府有虚檻前引泉水縈廻穿鑿像巴峽洞庭十二峯九𣲖迄于海門皆𨼆𨼆見雲霞龍鳳草樹之形有巨魚脇骨一條長二丈五尺其上刻云㑹昌六年海州送到在東南隅即徴士韋楚老拾遺别墅楚老風韻髙致雅好山水相國居廊廟日以白衣擢昇諫署後歸平泉造門訪之楚老避于山谷相國題詩云昔日徴黃詔余慙在鳳池今來招隠士恨不見瓊枝又新昌北街牛相國宅即𤣥宗朝將作監康𧦬舊第桑道茂謂之金杯俱出良相者也慈恩寺牡丹京國花卉之晨尤以牡丹為上至于佛宇道觀遊覽者罕不經歴慈恩浴堂院有花兩叢每開及五六百朶繁艷芬馥近少倫比有僧思振常話㑹昌中朝士數人尋芳遍詣僧室時東廊院有白花可愛相與傾酒而坐因云牡丹之盛葢亦奇矣然世之所玩者但淺紅深紫而已竟未識紅之深者院主老僧微笑曰安得無之但諸賢未見爾於是從而詰之經宿不去云上人向來之言當是曾有所覩必希相引寓目春遊之願足矣僧但云昔於他處一逢葢非輦轂所見及旦求之不已僧方露言曰衆君子好尚如此貧道又安得藏之今欲同看此花但未知不泄於人否朝士作禮而誓云終身不復言之僧乃自開一房其間施設幡像有板壁遮以舊幕幕下啓開而入至一院有小堂兩間頗甚華㓗軒廡欄檻皆是柏材有殷紅牡丹一窠婆娑幾及千朶初旭纔照露華半晞濃姿半開炫耀心目朝士驚賞留戀及暮而去僧曰予保惜栽培近二十年矣無端出語使人見之從今已往未知何如耳信宿有權要子弟與親友數人同來入寺至有花僧院從容良久引僧至曲江閑歩將出門令小僕寄安茶笈裹以黃帕於曲江岸藉草而坐忽有弟子奔走而來云有數十人入院掘花禁之不止僧俛首無言唯自吁嘆坐中但相盻而笑既而却歸至寺門見以大畚盛花舁而去取花者因謂僧曰竊知貴院舊有名花宅中咸欲一看不敢預有相告葢恐難於見捨適所寄籠子中有金三十兩蜀茶二斤以為酬贈管萬敵遇壯士㑹昌中左軍壯士管萬敵富有膂力扛鼎挾輈衆所推伏一日與儕軰㑹于東市酒肆忽有麻衣張葢者直入其座引觥而飲傍若無人萬敵振腕瞋目略無所憚同席恃勇之軰共為推挽竟不微動而觀者漸衆乃言曰某與管供奉較力以定强弱先請供奉拳某三拳後乞搭供奉一搭遂袒膊抱樓柱而立萬敵怒其輕已欲令殞于手下盡力拳之如扣木石觀者咸見樓柱與屋宇俱震其人略不微動既而笑曰到某搭供奉矣於是奮臂而起掌大如箕高及丈餘屹屹而下前後有力之軰方甚恐慄知非常人衆擁萬敵謝而去之俄失所在萬敵寢瘵月餘力遂消減張季宏逢惡新婦咸通中有左軍張季宏勇而多力嘗雨中經勝業坊遇泥濘深隘有村人驅驢負薪而至適當其道季宏怒之因捉驢四足擲過水渠數歩觀者無不驚駭後供奉襄州暮泊商山逆旅逆旅有老嫗謂其子曰惡人將歸矣速令備辦茶飯勿令喧噪既而愁憤吁嘆咸有所懼季宏問之媪曰有新婦悖惡制之不可季宏曰向來見媪憂恐有何事若是新婦豈不能共語媪曰客未知子細新婦壯勇無敵衆皆畏懼遂至於此季宏笑曰其他則非某所知若言壯勇當為主人除之母與子遽叩頭曰若此則母子無患矣雖然窮闕當為酬贈頃之鄰伍鄉社悉來觀視日暮婦人負束薪而歸狀貌亦無他異逆旅後囿有盤石季宏坐其上置騾鞭於側召而謂曰汝是主人新婦我在長安城即聞汝倚有氣力不伏承事阿家豈敢如此新婦拜季宏曰乞押衙不草草容新婦分雪新婦不敢不承事阿家自是大人憎嫌新婦其媪在傍謂曰汝勿向客前妄有詞理新婦因言曰只如某年月日如此事豈是新婦不是每言一事引手於季宏所坐石上以中指畫之隨手作痕深可數寸季宏汗落神駭但言道理不錯闔扉假寐伺晨而發及㢠廻問之新婦已他適矣玉蘂院眞人降上都安業坊唐昌觀舊有玉蘂花甚繁每發若瑶林瓊樹元和中春物方盛車馬尋玩者相繼忽一日有女子年可十七八衣繡綠衣乘馬峩髻雙鬟無簮珥之飾容色婉約迥出於衆從以二女冠三女僕僕者皆丱頭黄衫端麗無比既下馬以白角扇障面直造花所異香芬馥聞於數十歩之外觀者以為出自宫掖莫敢逼而視之佇立良久令小僕取花數枝而出將乘馬㢠廻謂黃冠者曰曩者玉峯之約自此可以行矣時觀者如堵咸覺煙霏鶴唳景物輝煥舉轡百歩有輕風擁塵隨之而去須㬰塵滅望之已在半天方悟神仙之遊餘香不散者經月餘日時嚴給事休復元相國劉賔客白醉吟俱有聞玉蘂院眞人降詩嚴給事詩曰味道齋心禱至神魂消眼冷未逢眞不如滿樹瓊瑶蘂笑對藏花洞裏人又云羽車潛下玉龜山塵界無由覩蕣顔惟有無情枝上雪好風吹綴綠雲鬟元相國詩曰弄玉潛過玉樹時不敎青鳥出花枝的應未有諸人覺只是嚴郎卜得知劉賔客詩云玉女來看玉樹花異香先引七香車攀枝弄雪時廻首驚怪人間日易斜又云雪蘂瓊絲滿院春羽衣輕歩不生塵君王簾下徒相問長記吹簫别有人白醉吟詩云嬴女偷乘鸞去時洞中潛歇弄瓊枝不緣啼鳥春饒舌青鎖仙郎可得知宰相布施乾符中有宰相自中書還第使人以布囊盛錢數千㳂路以施丐者於是貧乏相率羅列路隅所分既微漸不能普台鉉行李無復威儀時有朝士投牋諫之其略云方今兵冦互興民力凋弊所望明公弼成大化彌綸紀綱舉賢任能以光庶事俾萬物各得其理百姓日用不知損不急之官杜私門之請如此則刑清俗富天下自無窮人不宜專政廟堂方行小惠昔子產以已車濟人於溱洧君子謂不知為政不如以時修橋梁惟明公察焉執政者覽書慿怒俄而巢㓂陷京遂及於難崔道樞食井魚中書舎人韋顔子壻崔道樞舉進士乾符二年春下第歸寜漢上所居因井渫得鯉魚一頭長可五尺鱗鬛金色目光射人所視異於常魚令僕投於江水道樞與表兄韋氏密備鼎爼烹而食之經信宿韋得疾暴卒有碧衣人引至府舎廨宇頗甚嚴肅既入門見㕔事有女人戴金翠冠着紫繡衣據案而坐左右侍者皆黃衫金櫛如宫内之飾有一人吏從執簿領而出及軒陛間付雙鬟青衣著於繡衣案上更引韋生東廡曹署理詰殺魚之狀韋引過道樞云非某之罪吏曰此雨龍也若潜伏於江海湫湄雖人所食即無從而辨矣但昨者得之於井中崔氏與君又非愚昧殺而噉之俱難獲免然君且却還試與崔廣為佛道功德庶幾消減其過自兹浹旬當復相召韋忽然而寤具以所説話於眷屬命道樞具述其事道樞雖懐憂廹亦未深信纔經及旬餘韋生果殁韋乃道樞姑之子也數日後寄夢於母云以殺魚獲罪所至之地即水府非久當受重譴可急修黃籙道齋尚兾得寛刑辟表兄之過亦成矣今夕當自知其事韋母泣告道樞及瞑昬然而寢復見碧衣人引至公署俱是韋之所述俄有吏執黑紙丹書文字立道樞於屏側疾趨而入見繡衣操筆而書訖吏接之而出令道樞覽之其初云某官登四品年至七十二其後有判詞云崔道樞所害雨龍事關天府原之不可按罪急追所有官爵並皆削除年壽亦減一半時道樞三十五矣夜分而寤恍惚悲涕莫知所為時節在冬季其母方為修崇福力纔及春首抱疾數日而終時崔之妻孥咸在京師紫微備述其事舊傳䕫州及牛渚磯皆是水府未詳道樞所至何所也洛中豪士乾符中洛中有豪貴子弟承藉勲蔭物用優足恣陳錦衣玉食不以充詘為戒飲饌華鮮極口腹之欲有李史君出牧罷歸居止亦在東洛深感其家恩舊欲召諸子從容有敬愛寺僧聖剛者常所來往李因以其宴為説僧曰某與之門徒久矣每見其飲食窮極水陸滋味常饌必以炭炊往往不愜其意此乃驕逸成性史君召之可乎李曰若求象白猩唇恐不可致止於精潔修辦小筵未為難事於是廣求珍異俾妻孥親為調鼎備陳綺席雕盤𨕖日為請弟兄列坐矜持儼若氷玉肴羞每至曾不下筯主人揖之再三惟霑果實而已及至水餐俱致一匙於口然相盻良久咸若飱荼食蘖李莫究其由以失餁為謝明日復覩聖剛備述諸子情貌僧曰某前所説豈謬哉而因造其門以問之曰李史君特備一筵庖膳間可為豐㓗何不略領其意諸子曰燔炙煎和未得其法僧曰他物縱不可食炭炊之飯又嫌何事復曰上人未知凡以炭炊飰先燒令熟謂之煉火方可入爨不然猶有煙氣李史君宅炭不經煉是以難於飡㗖僧撫掌大笑曰此非貧道所知也及大冦先陷瀍洛財産剽掠俱盡昆仲數人與聖剛同時竄避潛伏山草不食者三日賊鋒稍逺徒走將往河橋道中小店始開以脱粟為餐而賣僧囊中有錢數文買於土杯同食腹枵既甚粱肉之美不如僧笑而謂曰此非煉炭所炊不知可與諸郎君喫否但低首慙靦無復詞對古人云膏粱之性難正其此之謂乎是以聖人量腹而食賢者戒於奢逸宋武帝幸武帳堂將往勑諸子弟勿食至㑹所賜饌日旰而食不至咸有飢色帝謂曰爾曹少長驕貴不見百姓艱難今使爾等識有飢苦知以節儉期物前聖用心同㫖哉鳳翔府舉兵討賊巢冦攻䧟宫闕近京藩鎮悉無兵備初王仙芝敗衂黄㓂引餘黨南走交廣朝廷以髙駢令公統帥諸道兵師於江湖屯據要路議者以為髙令公奕世名將可以坐制兇渠及賊徒擁衆北來浮舟遂逼淮甸於天長縣廣布營寨駐泊髙令公既不出軍但閉關自保而已賊鋒因此彌鋭長驅遂渉淮北時齊相公領青州覩蜂蟻强衆亦不敢進卷斾遄征或於中路遲留藩屏既無捍禦廟堂復失機謀盗遍九衢乃未知覺豈不異哉時李相鎮蒲津鄭相國鎮岐下既聞車馬播遷俱有勤王之念鄭相國率賔僚將校共廵城壘雉堞池隍悉皆毁塞計其修築之功萬旅月餘未竟而賊鋒方盛立虞奔軼明晨復召從事大將坐於内㕔詢以謀計咸以巨盗方熾未可枝梧衆議且欲從權俟兵集乃圖收復相國曰諸君勸某臣賊乎於是歘然而倒左右扶之不及為地甃所傷面首皆破洎日午達於明旦口喑尚未能語是時關輔征鎮咸已歸欵唯鳳翔信耗不通賊議興師致討有奔來者具述其事於是監軍與僚佐代為表章使兩騎馳至京國賊徒覽之大喜遣王懐順將百餘人厚齎綵繒金玉以申慰勞之意既而開筵以待懐順宴席施設侔於曩日列坐行觴將陳飲饌樂工纔合管絃文武軍吏及聲妓一時慟哭監軍從事雪涕止之良久方定懐順與來者皆駭愕相眄就食乃問其由時吏部孫侍郎亦在幕中對曰相國自鎮此方恩及萬物聽政之暇時命音樂與將吏交歡遽及風疹所侵今辰不赴兹㑹衆聞絲竹聲不覺悲泣耳是日合城老幼咸共悽傷相國聞之曰我知億兆人民之心未厭唐德賊勢雖甚竊據宫闕滅亡當在旦夕於是密飛羽檄告於隣道㑹兵旬朔間邠涇洋隴及沿邊藩鎮俱以鋭師來集既而神策守鎮軍士聞風亦至麾下一旦賊中遣千餘人大索糧糗于時烽候已嚴偵邏殊密雲旗霜刃森羅於百里之内賊入界大驚俱就擒戮有後殿者奔以狀告兇黨無不奪魄陷京黔庶亦思奮勇初有走還京中者云鳳翔鄭相公已叛黃王兵士甚衆巢聞之殊不介意言我行却半天下所至無不收剋直至髙令公猶不敢出軍敵我鄭相國擬作何計唯趙張王潘聞之已為奔軼之備也俄而蒲關晉絳并汾澤潞及河北三鎮並舉雄師翕然響附相國仗節訓兵援旗誓衆摧鋒督戰累剉兇渠首運奇謀終摧巨孽其後請朝庸蜀復秉化權匡國濟時終始一致文經武緯何謝古人詩云維岳降神生甫及申維申及甫維周之翰相國有焉老君廟畫東都北邙山有𤣥元觀南有老君廟臺殿髙敞下瞰伊洛神仙泥塑之𧰼皆開元中楊惠之所製奇巧精嚴見者増敬壁有吳道元畫五聖真容及老子廟胡經事丹青絶妙古今無比杜工部題詩云配極元都閟慿髙禁籞長守祧嚴具禮掌節鎮非常碧瓦初寒外金莖一氣旁山河扶繡户日月近雕梁仙李蟠根大猗蘭奕葉光世家遺舊史道德付今王畫手看前軰吳生逺擅塲森羅移地軸妙絶動宫牆五聖聨龍衮千官列鴈行冕旒俱秀發旌斾盡飛楊翠柏深留景紅梨逈得霜風筝吹玉柱露井凍銀牀身退卑周室經傳拱漢皇谷神如不死養拙更何郷敬愛寺復有雉尾病龍莫知畫者誰氏繪事奇巧皆入神之迹雉尾在東廡觀音院天王部從中緋衣神人抱野雉一隻逼而觀之勢若飛動政平坊安國觀明皇朝玉眞公主所建門樓髙九十尺而柱端無栱枓殿南有精思院琢玉為天尊老君之像葉法善羅公逺張果先生並圖之於壁院南池沼引御渠水注之壘石像蓬萊方丈瀛洲三山女冠多上陽退宫嬪御其東與國學相接咸通中有書生云每清風朗月即聞山池之内歩虚笙磬之音盧尚書有詩云夕照紗牕起暗塵青松遶殿不知春君看白首誦經者半是宫中歌舞人白傅乗舟白尚書為少傅分務洛師情興高逸每有雲泉勝境靡不追遊常以詩酒為娛因著醉吟先生傳以敘盧尚書簡辭有别墅近枕伊水亭榭清峻方冬與羣從子姪同遊倚欄眺翫嵩洛俄而霰雪微下情興益髙因話廉察金陵常記江南煙水每見居人以葉舟浮泛就食菰米鱸魚近來思之如在心目良久忽見二人衣簑笠循岸而來牽引水鄉蓬艇船頭覆青幕中有白衣人與衲僧偶坐船後有小竈安桐甑而炊丱角僕烹魚煑茗泝流過於檻前聞舟中吟嘯方甚盧撫掌驚歎莫知誰氏使人從而問之乃曰白傅與僧佛光同自建春門往香山精舍其後每遇親友無不話之以為高逸之情莫能及矣嚴史君遇終南山𨼆者大中末建州刺史嚴士則本穆宗朝為尚醫奉御頗好眞道因午日於終南山採藥迷誤於巖嶂之間不覺遂行數日所齎糗糧既盡四逺復無居人計其道路去京不啻五六百里然而林岫深僻風景明麗忽有茅屋數間出於松竹之下煙蘿四合纔通小徑士則連扣其門良久竟無出者窺其籬隙之内有一人於石榻偃卧看書推户直造其前方乃攝衣而起士則拜罷自陳行止因遣坐於盤石之上亦問京華近事復詢天子嗣位幾年云自安史犯闕居此迄於今日士則具陳奔馳渉歴資糧已絶廹於枵腹請以食饌救之𨼆者曰自居山谷且無煙爨有一物可以療之念君逺來相遺自起於梁棟之間脱紙囊開啓其中有百餘顆如藊豆之狀俾於藥室取鐺拾薪汲泉而煑良久盛有香氣視之已如掌大曰可以食矣渇即取鐺中餘水飲之士則方㗖其半已極豐飽復曰汝得至此當有宿分自兹三十年間不飢渇俗情慮將淡泊也他時位至方伯當取羅浮相近儻能脱去紛華兼獲長生之道辭家日久可以還矣士則將欲告歸因述慮失道曰勿憂去此二三里與採薪人相值可以隨之而至國門不逺既出於山隅果有採薪者在路側或問𨼆者姓名竟無所對纔經信宿已及樊川村野既還輦轂不喜更嘗滋味日覺氣壯神清有驂鸞馭鶴之意衣褐杖藜多止巖岫居守盧僕射耽味𤣥黙思覩異人有道流述其事延之致於門下及聞方伯之説因以處士奏官自梓州别駕作牧建溪時年已九十到郡纔經周歲觧印乃歸羅浮及韋相公宙出鎮廣南使人訪之猶在山谷大中十四年之任建安路由江浙時蕭相國觀風浙右於桂樓宿宴召之唯飲酒數杯他皆無食也韋顓梟鳴大中年韋顓舉進士詞學優贍而貧窶滋甚歲暮飢寒無以自給有韋光者待以宗黨後名殷裕之輟居所外舎館之放牓之夕風雪凝互報光成名者絡繹而至顓略無登第之耗光延之於堂際小閣備設肴饌慰安之見光婢妾羅列衣裝僕者排比鞍馬顓夜分歸于所止擁爐而坐愁嘆無已候光成名將修賀禮寢榻廹于壊牖以橫竹掛席蔽之簷際忽有嗚梟頃之集於竹上顓神魄驚駭杖策出户逐之飛起復還久而方去謂僕者曰我失意亦無所恨妖禽作怪如此兼恐横罹災患俄而禁鼓忽鳴牓到顓已登第光之服用車馬悉皆遺焉世以鵩至梟鳴不祥之兆近觀數事亦不然乎昔鄧艾梟鳴牙旗乃軍勝之兆張率更聞於庭樹亦授官之祥以此推之未必皆為不吉者命相日雨雹崔沆豆盧琢乾符六年夏五月巢冦自廣陵將及襄漢朝廷以王鐸令公為南面都統崔相國豆盧相國同日策拜宣麻之際殿庭霧氣四塞及政事堂立班賀有雹大如雞卵時五月二十三日識者以為鈞軸不祥之兆明年大冦攻陷京師二相俱及于難其天意乎非人事也李生見神物遗酒咸通中有中牟尉李潯寓居圃田别墅稟性剛戾不以鬼神為意每見人銜杯酹酒無不怒而止之一旦暴得風眩方卧簷廡之下忽有田父立於榻前云隣伍間欲來省疾見數人形貌尫劣服飾或青或紫後有矮僕提酒兩壺相與歴堦而上左右妻孥悉無所覩謂潯曰爾常日負氣忽於我曹至於醪醴之間必為他人愛惜今有醇酎數斗衆欲遗君一醉俄以巨盆滿酌逼飲兩壺俱盡牀笫衾禂皆是餘瀝將出謂潯曰何似當時惜酒自兹百骸昏悴如病宿酲寢瘵惙然數月方愈馮給事為鄭州刺史親召李生而説之説方士武宗皇帝好神仙異術海内道流方士多至輦下趙歸眞探賾𤣥機善制鉛汞氣貌清爽見者無不竦敬請於禁中築望仙臺髙百尺以為鸞驂鶴馭可指期而降常云飛鍊中須得生銀詔使於樂平採取既而大役工徒所出者皆銜石礦非烹冶乃無從而得歸真齋醮數朝寫御書置於巖穴間俄有老人䇿杖而至曰山川藏寳葢因有道而出况明主以修眞為念是何感應不臻尊師無復懐憂明旦當從所請語罷而出莫知其所之是夕有聲如雷山礦豁開數丈銀液坌然而湧出與入用之數相符禁中修鍊至多外人罕知其術復有金陵人許元長王瓊者善書符幻變近於役使鬼神㑹昌初召至京國出入宫闈武皇謂之曰吾聞先朝有明崇儼善於符籙嘗取羅浮山柑子以資御果萬里往來止於旬日我雖聖德不逮前朝卿之術豈便劣於崇儼元長謝曰臣之受法未臻𤣥妙若渉越山海恐誣聖德但千里之間可一日而至上曰東都常進石榴時已熟矣卿今夕當致十顆元長奉語而出及旦寢殿始開金盤貯石榴致於御榻俄有中使奉進亦以所失之數上聞靈驗變通皆如此𩔖王瓊妙於化物無所不能方冬以藥栽培桃杏數株一夕繁英盡發芳蘂穠艷月餘方謝及武皇猒代歸眞與瓊俱竄逐嶺表唯元長逸去莫知所在昊天觀周尊師乾符中年九十七自言以童幼間便居洞庭山諸父隠堯深得真道有張孺華者襄漢豪士耽味𤣥黙一旦廣齎財寶訪道於江湖之間至吳門知𨼆堯出世修鍊逕往洞庭詣之囊槖中所挈金帛傾竭以資香火𨼆堯知其志俾於岸頂坐守藥爐其或風雨晦㝠徃往有神物來萃殊形詭狀深可駭人孺華端㓗自安竟不微動如此者渉於周歳𨼆堯謂之曰爐中鍊藥乃七返靈砂也雖非九轉金丹餌之可還魂返魄曩令子弟數軰守之靡不畏怯而罷汝相從未久遂能苦節如是及鼎開藥成纔成十粒但令寶之以囊篋未傳吞餌之法孺華以去鄉逾年一旦告歸覲省𨼆堯别謂之曰吾知汝未能久住自兹復為世網所縈茍慕仙之意不忘勿以囂塵為戀付汝之藥每丸可益筭十二有疾終者審其未至朽敗雖渉旬能使再活然事關陰隲非行道有心之徒不可輕授凡欲此藥救人當焚香啓告吾為助爾孺華歸甚為鄉里所敬父母遘疾而殁服之皆愈居數歲復詣洞庭繫舟於金陵江岸有良賈徐士則者乘巨艘十餘隻亦於浦間同泊有子一人方及壯歲無疾而殞於中夜父母咸以衰耄哭泣不食崇朝孺華憫之因以靈砂往救其初服之時未驗再服一粒蹶然而蘇云所至之處城府甚嚴方為吏從拘録俄有二黃衣人手執丹書文字洞庭周尊師令喚㕔事間有紫衣者據案而坐於是簮笏而興謂左右曰仙師來召焉可復留乃令放還謂曰汝因此壽命増延當可力行善道士則所將財物分其半以答孺華孺華取錢五十萬散施貧乏至洞庭與𨼆堯俱𨼆廣謫仙怨詞台州刺史竇宏餘撰𤣥宗天寶十五載正月安祿山反陷沒洛陽王師敗績關門不守車駕幸蜀途次馬嵬驛六軍不發賜貴妃自盡然後駕發行次駱谷上登髙下馬謂力士曰吾蒼惶出狩長安不辭宗廟此山絶髙望見秦川吾今遥辭陵廟因下馬望東再拜嗚咽流涕左右皆泣謂力士曰吾聽九齡之言不到於此乃命中使往韶州以太牢祭之中書令張九齡每因奏對未嘗不諫誅祿山上怒曰卿豈以王夷甫識石勒陳殺祿山於是不敢諫矣因上馬遂索長笛吹一曲曲成澘然流涕竚立久之時有司旋錄成譜及鑾駕至成都乃進此譜請曲名上不記之視左右曰何曲有司具以駱谷望長安下馬後索長笛吹出對上良久曰吾省矣吾因思九齡亦别有意可名此曲為謫仙怨其㫖屬馬嵬之事厥後以亂離隔絶有人自西川傳得者無由知但呼為劒南神曲其音怨切諸曲莫比大厯中江南人盛為此曲隨州刺史劉長卿左遷睦州司馬祖筵之内吹之為曲長卿遂撰其詞意頗自得葢亦不知夲事詞云晴川落日初低惆悵孤舟解攜鳥去平蕪逺近人隨流水東西白雲千里萬里明月前溪後溪獨恨長沙謫去江潭春草萋萋余在童幼亦聞長老話謫仙之事頗熟而長卿之詞甚是才麗與本事意興不同余既備知聊因暇日輒撰其詞復命樂工唱之用廣不知者其詞曰胡塵犯闕衝關金輅提攜玉顏雲雨此時消散君王何日歸還傷心朝恨暮恨廻首千山萬山獨望天邊初月蛾眉猶在彎彎軿以為竇史君序謫仙怨云劉隨州之詞未知本事及詳其意但以貴妃為懐葢明皇登駱谷之時實有思賢之意竇之所製殊不述焉駢因更廣其詞葢欲兩全其事雖才情淺拙不逮二公而理或可觀貽諸識者詞云晴山礙日横天綠疊君王馬前鑾輅西廵蜀國龍顏東望秦川曲江魂斷芳草妃子愁凝暮煙長笛此時吹罷何言獨為嬋娟含元殿含元殿國初建造鑿龍首崗以為基址彤墀釦砌髙五十餘尺左右立栖鳳翔鸞二闕龍尾道出於闕前倚欄下瞰前山如在諸掌殿去五門二里每元朔朝㑹禁軍與御仗宿於殿庭金甲葆戈雜以綺繡羅列文武纓珮序立蕃夷酋長仰觀玉座若在霄漢識者以為自姬漢之代迄于亡隋未有如斯之盛京城自朱泚之亂逮乾符中近百年無事君臣和叶四表靖謐文物之盛籠罩姬漢蕃方職貢府無虚月上至士君子下及庶民皆修飭廉謹以邀時譽食祿者守其官耕賈者專其業八紘四海遂同文軌承平既久稍務奢逸貴族豪家輕視稼穡征鎮牧守或非其才黔黎興杼軸之嗟郡邑有萑蒲之盗然主上勞謙端委無虧聖政亦使冦犯神州鑾輅播越况秦漢之代魏晉之時主荒臣殘豈不顚覆今則覩淳輝之列啓中興之期億兆人心復新於唐德矣禮樂刑政得無誡哉曲江曲江池本秦世隑洲開元中疏鑿遂為勝境其南有紫雲樓芙蓉苑其西有杏園慈恩寺花卉環周煙水明媚都人遊翫盛於中和上巳之節綵幄翠幬匝於堤岸鮮車健馬比肩擊轂上巳即賜宴臣僚京兆府大陳筵席長安萬年兩縣以雄盛相較錦繡珍玩無所不施百辟㑹於山亭恩賜太常及敎坊聲樂池中備綵舟數隻唯宰相三使北省官與翰林學士登焉每歲傾動皇州以為盛觀入夏則菰蒲蔥翠柳隂四合碧波紅蕖湛然可愛好事者賞芳辰翫清景聨騎攜觴亹亹不絶昇平裴相國廉察宣城朝謝後未離京國時曲江荷花盛發與省閣名士數人同遊自慈恩寺屏去左右各領小僕歩至紫雲樓下見五六人坐於水際裴公與名士憩于旁中有黃衣飲酒半酣軒昻頗甚指顧笑語輕脱裴意稍不平揖而問之吾賢所任何官率爾而對曰喏即不敢新授宣州廣德縣令連問裴曰押衙所任何職裴公效曰喏即不敢新授宣州觀察使於是狼狽而走同坐亦皆奔散朝士撫掌大笑不數日布於京華左右於銓司訪之云有廣德縣令請換羅江宰矣宣皇在宫即聞是説與諸王每為戲談其事及龍飛裴公入秉鈞軸因書麻制廻謂樞近曰喏即不敢新授中書侍郎平章事眞身咸通十四年詔自鳳翔迎眞身至于輦下眞身相傳云是釋迦文佛中指節骨長一寸八分瑩浄如玉以小金棺盛之舊於鳳翔建塔又釋氏湼槃經云如來於䨇林滅度貯於金棺銀椁積㫋檀香焚之諸天以八金剛分取舍利唯留四牙餘悉煨燼未詳此骨從何而有都城士庶奔走雲集自開逺門達於岐川車馬晝夜相屬飲饌盈溢路衢謂之無碍檀施京城坊曲舊有迎眞身社居人長幼旬出一錢自開成之後迄于咸通計其資積無限於是廣為費用時物之價髙茶米載以大車往往至於百兩他物豐盈悉皆稱是至京日上與諸王親御城樓坊市以繒綵結為龍鳳象馬之形紙竹作僧佛鬼神之狀幡花幢葢之屬羅列二十餘里間之歌舞管絃雜以禁軍兵仗緇徒梵誦之聲沸聒天地民庶間有嬉笑踴躍者有悲愴涕泣者眞身以寶􅓅舁之居于内殿數月俄屬懿皇猒代密使送於鳳翔先是眞身到城每坊十字街以甎壘浮圖供養妖妄之軰互陳感應或云夜中震動或云其上放光以求化資財因此獲利者甚衆及宫車晏駕帖然乃定諸坊浮圖一時毁坼有好事者密詢放光之由云以大雲母片窺看逺而望之靡不傾信耳咸通乾符中興善寺復有阿闍黎以敎法傳授都下翕然宗之所居院金碧華煥器用俱是寶玉語人云焚香結坐每告西方及遷化謚為普照大師信者咸為出涕劉都尉崔給事寓張常侍同與中貴多為弟子出城之日皆縞素後隨勸朝士持齋受其法者不復思理時務駢常讀名僧傳宋文帝時有求那跋摩居金陵秪洹喜文帝謂之曰弟子常願持齋不殺廹於以身徇物不獲遂從法師不逺萬里來化此國將何以敎化之對曰道在心不在事法由已不由人且帝王凡庶所修亦有殊矣若凡庶者身賤名微德不及逺其敎不出於閨門其言不行於僕妾若不克己苦躬行善持戒將何以用心哉帝王以四海為家萬民為子出嘉言則士庶咸悦布一善則人神以和刑清不夭其命役簡不勞其力辨鍾律定時令鍾律辨則風雨調號令時則寒暑節知百姓之饑斯所以就於無饑知百姓之寒斯所以就於無寒如此持齋亦大矣不殺則衆矣安在於闕一時之膳全一禽之命然後乃𢎞濟也文帝撫几嗟嘆稱善良久乃曰俗人迷於逺理沙門滯於近敎迷逺理者謂至道虚説滯近敎者則拘攣章句如公者眞所開悟明達可以言天人之際矣元相國謁李賀元和中進士李賀善為歌篇韓文公深所知重於縉紳之間每加延譽由此聲華藉甚時元相國稹年老以明經擢第亦攻篇什常願交結賀一日執贄造門賀覽刺不容遽令僕者謂曰明經擢第何事來看李賀相國無復致情慙憤而退其後左拾遗制策登科日當要路及為禮部郎中因議賀祖禰諱晉不合應進士舉亦以輕薄時軰所排遂成轗軻文公惜其才為著諱辯錄明之然竟不成事自大中咸通之後每歲試春官者千餘人其間章句有聞亹亹不絶如何植李玫皇甫松李孺犀梁望毛濤貝庥來鵠賈隨以文章著美温庭筠鄭瀆何㳙周鈐宋耘沈駕周繁以詞賦標名賈島平曾李陶劉得仁喻坦之張喬劇燕許琳陳覺以律詩流傳張維皇甫川郭鄩劉延暉以古風擅價皆苦心文華厄於一第然其間數公麗藻英詞播於海内其虚薄叨聨名級者又不可同年而語矣劇談錄卷下
