body:
  text: 劇談錄小說家𩔖異聞之屬提要臣等謹案劇談録三卷唐康駢撰王定保摭言作唐駢葢傳寫之訛故也唐書藝文志作康軿以其字駕言證之二字義皆相合未詳孰是然諸書引之皆作駢疑亦唐志誤也駢池陽人乾符四年登進士第官至崇文館校書即是書成於乾寕二年皆記天寳以來𤨏事亦間以議論附之凡四十條今以太平廣記勘之一一相合非當時全部収入即後人從廣記抄合也此本末有臨安府陳道人書籍舗刋行字葢猶影抄宋本如潘將軍一條注中疑為潘鶻硉字今本劍俠傳從廣記剽掇此條訛為潘鶴碎遂不可觧知此本為善矣其中載元微之年老擢第執贄謁李賀一條古夫于亭雜録辨之曰案元擢第既非遲暮于賀亦稱前輩詎容執䞇造門反􅇜輕薄小説之不根如此其論最當然稗官所述半出傳聞真偽互陳其風自古未可全以為據亦未可全以為誣在讀者考證其得失耳不以是廢此一家也乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書卷子部十二劇談錄目錄小説家𩔖二異聞之屬卷上宣宗夜召翰林學士劉平見安祿山魑魅王鮪活崔相公歌妓御史灘渾令公李西平􅅡朱泚雲梯潘將軍失珠李鄴侯救竇庭芝續坤蹶馬龍待詔相笏孟才人善歌袁相雪換金縣令郭鄩見窮鬼裴晉公天津橋遇老人狄惟謙請雨王侍中題詩道流相夏侯譙公華山龍移湫田膨郎偷玉枕洛中大水李朱崖知白令公卷下劉相國宅李相國宅慈恩寺牡丹管萬敵遇壯士張季宏逢惡新婦玉蘂院眞人降宰相布施崔道樞食井魚洛中豪士鳳翔府舉兵討賊老君廟畫白傅乗舟嚴史君遇終南山𨼆者韋顓梟鳴命相日雨雹李生見神物遺酒説方士廣謫仙怨詞含元殿曲江眞身元相國謁李賀
