body:
  text: 劇談錄卷上唐康駢撰宣宗夜召翰林學士宣宗皇帝聖政欽明光宅天下常欲刑清俗富有宵衣旰食之懐仄席竚賢每如不及令狐相國自吳興郡守授司􅈴郎中未居内署初與學士候對便以為有宰輔之才一夕於禁林寓直忽有中使來召行百餘歩至于便殿遣内人秉燭候之引於御榻之前上自宣令坐問卿來從江表見彼中甿庶安否廉察郡守字人求瘼之道如何朕常思四海之大九州之廣雖明君不能自理常須良弼賢佐邇來竊窺朝廷皆未覩其忠赤相國降堦俯伏曰聖意如此微臣便合得罪上曰卿纔為翰林學士所職者朕之絲綸向來之言本不相及既而復宣令坐俾御以玉杯斟酒賜之有小案置於御牀案上有書兩卷指謂相國曰朕聽政之暇未嘗不披尋史籍此讀者先朝所述金鏡一卷則尚書大禹謨復問卿曾讀金鏡否對曰文皇帝所著之書有理國理身之要披閲誦諷不離於口上曰卿試舉其要相國跪於御前抗聲而誦至亂未嘗不任不肖理未嘗不任忠賢任忠賢則享天下之福任不肖則受天下之禍上止之曰朕每讀至此未嘗不三復後已書又云任賢勿貳去邪勿疑是則欲致昇平當用此言為首相公抃舞而稱曰先臣父每言金鏡垂裕可為萬古格言自非聰明文思無以探其壼奥况堯舜禹湯之道在典謨訓誥之間陛下不以黄屋為尊每觀之於夙夜將欲擇賢舉善使庶績咸熈如此則功冠百王事超三五矣上曰曩者仰卿材器今日覩卿詞學臨軒竚立乆之謂中使曰持燭送學士歸院及還禁林夜漏將半咸以近臣恩澤殆無其比繇是注意益深居嵗餘遂為宰相自郡守至於台鉉首尾纔經二載嘗自郊壇廻渭南尉趙嘏上詩云鶚在卿雲氷在壺代天材業奉訏謨榮同伊陟傅朱户秀比王商入畫圖昨夜星辰廻劔履前年風月滿江湖不知機務時多暇猶許詩家屬和無議曰凡懐才抱器有時而通非得茍容雖遇不顯向使明主有任賢之意近臣無專對之能徒彰妄進之譏方病退慙之説殊恩厚渥豈及於身是以君子勵志飭躬以遭逢之運良有㫖哉劉平見安祿山魑魅咸通中有五經博士盧斚得神仙保養之道自言生於隋代宿德朝士皆云見於童幼舉世信奉之不窮年壽云安史之亂隱於終南山中其後或出或處先是令狐相公諭以柱下漆園之事稍從宦於京師常話與處士劉平執友修道平天寳中居於齊魯間尤善吐納之術能夜中視物不假燈燭安祿山在范陽厚幣致於門下平見祿山左右常有鬼物數十殊形詭狀持鑪執葢以為導從平心異之謂祿山必為人傑及祿山朝覲與平俱至輦下行至華隂縣值葉天師投龍於西嶽平見二青衣童子乘虚而至所衛祿山魑魅皆棄鑪投葢狼狽而行平因知祿山為邪物所輔必不以正道克終及祿山却歸范陽遂逃入華山而𨼆王鮪活崔相公歌妓鳳翔少尹王鮪侍郎凝之叔也年十四五與兒童戲於果園竹林下見二枯首為糞壤所沒乃令小僕擇淨地瘞之祭以酒􅄿其後數夕陰晦忽聞牕外􅀢􅌥有聲良久問之云某等受郎君深恩免在蕪􅁾未知所酬耶願以驅策邇來凡有吉凶先兆肹蠁必來潜報如此數年遂與靈物通徹崔相國珙為度支使雅知於鮪一夕留飲家釀酒酣稍歡云有小妓善歌得於親友因令左右召之良久不至相國俄而自歸内見理粧纔罷忽病心痛請飲湯而出相國怪而問之云適見一人著短後緋袍控馬而去語未畢家僕遽報中惡救之不及矣相國悲惋不已鮪密言有一事或可救之然須得白牛頭及酒一斛因召左右試令求覓有度支所由幹事者徑詣東市肉行以善價取之將牛頭而至鮪令扶策歌者置於淨室榻前以土盆盛酒横板用安牛頭設席焚香密封其户且戒曰專伺之曉鼓一動聞牛吼當急開户可以活矣鮪既去久而無聲禁鼓忽鳴果聞牛吼開户視之歌者微喘盆中斛酒悉乾牛目怒出於外數日之後方述前事云其夕治粧既畢有人促召出門乗馬而行約數里見有室宇華麗其間列筵張樂四座皆朱紫少年見歌者至大喜致於女妓中歡笑方洽忽聞人大呌聲震庭廡坐中皆失色相視妓樂俱罷俄見牛頭人長丈餘執㦸徑趨而入無不狼狽而走唯歌者在焉牛頭者引於堦前背負而出纔數十歩忽覺卧於室内邇後相國詢其由鮪終不言盡其事御史灘河南府伊闕縣前臨大溪每僚佐有入臺者即水中先有小灘漲出石礫金沙澄澈可愛牛相國為縣尉一旦忽報灘出翌日􅌥邑者與同僚列筵于亭上觀之因召耆宿詢其事有老吏云此必分司御史非西臺之命若是西臺灘上當有䨇鸂䳵立前後居人以此為則相國潜揣縣僚無出於已因舉杯祝曰既能有灘何惜一雙鸂䳵宴未終俄有飛下不旬日拜西臺監察御史渾令公李西平􅅡朱泚雲梯朱泚之亂德宗皇帝車駕出幸奉天是時㳂邊藩鎮皆已舉兵扈蹕泚自率兇渠直至城下有西明寺僧陷在賊中性甚機巧敎泚造攻城雲梯其髙九十餘尺上施板屋樓櫓可以下瞰城中渾中令李司徒奏曰賊鋒既盛雲梯又壯若縱之誠恐不能禦及其尚逺請以鋭兵挫之遂率王師五千列陣而出于時束蘊居後約戰酣而燎風勢不便火不能舉二公酹酒抗詞拜空而祝天道助順至聖感神泚賊包藏禍心竊弄凶器敢以狂孽來犯乗輿今擁衆脅君將逼城壘瑊等誓輸忠節志殄妖氛若社稷再興威靈未冺當使雲梯就􅅡逆黨氷銷於是詞情慷慨人百其勇俄而風勢遽廻鼔譟而進火烈飈駭煙埃漲天梯燼卒奔賊遂退衂徳宗皇帝御樓以觀中外咸稱萬歲及尅復京國二公勲績為首寵錫茅土銘鏤鐘鼎匡扶社稷終始一致其後李司徒有子四人皆分部節制忠烈榮耀于今藹然李司徒嘗於左廣効職久未遷昇聞桑道茂善相人賫絹壹匹凌晨而往時道茂傾信者甚衆造謁多不見之聞李公在門親自迎接施設肴醴情意甚專既而問之謂曰他日建立勲庸貴盛無比或事權在手當以性命為托李公莫測其由但慙唯而已請廻所貺縑換李公所著汗衫子仍請於􅁭上書名云他日見此相憶及泚之叛道茂䧟在賊庭既尅復京師從亂者悉皆就戮李公受命斬决道茂將就刑請致分雪之詞遂以汗衫為請李公奏以非罪遂令原之潘將軍失珠京國豪士潘將軍住光德坊忘其名時人呼為潘鶻硉也本居襄漢間常乗舟射利因泊江壖有僧乞食留之數日盡心檀施僧謂潘曰觀爾形質器度與衆賈不同至於妻孥已來皆享巨福因以玉念珠一穿留贈云寳之不但通財他後亦有官祿既而遷貿數年藏鏹巨萬遂均陶朱其後職居左廣列第京師常寳念珠貯之以繡囊玉合置之於道塲内每月朔則出而拜之一旦開合啓囊已亡失珠矣然而緘封若舊他物亦無所失於是奪魄䘮精以為其家將破之兆有主藏者嘗識京兆府停解所由王超年且八十已來因密話其事超曰異哉此非攘竊之盜也其試為尋之未知果得否超他日因過勝業坊北街時春雨新霽有三鬟女子年可十七八衣裝藍縷穿木屐立於道側槐樹下值軍中少年蹴踘接而送之直髙數丈於是觀者漸衆超獨異焉及罷隨之而行止於勝業坊北門短曲有母同居葢以紉針為業超異時因以他事熟之遂為甥舅然居室甚貧與母同臥土榻煙爨不動者往往經于累日設肴羞時有水陸珍異吳中初進洞庭橘子恩賜宰臣外京輦未有此物密以一枚贈超云有人從内中出而稟性剛決超意甚疑之如此往來周歲矣超一旦㩦酒食與之從容徐謂之曰舅有深誠欲告外甥未知如何女曰每感重恩恨無所答若力有可施必能赴湯蹈火超曰潘將軍失却玉念珠不知知否女子微笑曰從何知之超揣其意不甚密藏又曰外甥可尋覓厚備繒綵酬之女子曰勿言於人某偶與朋儕為戲終却還與因循未暇舅來日詰旦於慈恩寺塔院相候某知有人寄珠在此超如期而往時寺門始開塔户猶鏁女子先在謂超曰少頃仰觀塔上當有所見語訖而去疾若飛鳥忽於相輪上舉手示超歘然㩦珠而下謂超曰便可將還勿以財帛為意超徑詣潘具述其事因以金玉繒錦密為之贈明日訪之已空室矣馮鉞給事常聞京師多任俠之徒及為尹密詢左右引超具述前事訪潘將軍所説與超符同李鄴侯救竇庭芝寳應年中員外郎竇庭芝分司洛邑常敬事卜者胡盧生每言吉凶無不必中如此者往來甚頻長幼莫不傾信一旦凌晨入門頗甚嗟惋庭芝問之良久乃言君家大禍將成舉族恐無遺𩔖即未在旦夕所期亦甚不逺既而舉家涕泣請問求生之路云非遇黃中君鬼谷子不可相救然黃中君造次難見但見鬼谷子當無患矣具述形貎服餙仍約浹旬求之於是竇與兄弟羣從洎妻子奴僕曉夕求訪於洛下時李鄴侯有内艱居于河清縣因省覲親友策蹇驢入洛至中橋南遇大尹避道所乗驢忽驚逸而走徑入庭芝所居與僕者共造其門值庭芝車馬羅列將出忽見鄴侯皆驚眙而退俄有人出來云此是分司竇員外宅所失驢收在馬廐請客入座員外嘗願修謁如此者數四鄴侯不獲已就其㕔事庭芝既出降堦而拜延接殷勤遂至信宿至如妻孥孩稚咸備家人之禮數日告去贈送殊厚但云貴達之辰願以一家為託鄴侯居于河清信宿旁午於道及朱泚搆逆庭芝方廉察陜服車駕出幸奉天遂䧟於賊庭及鑾輿返正德宗首命誅之鄴侯自南嶽徴廻至行在便為宰相因第臣僚罪狀遂請庭芝减死聖意不解云卿以為寜王懿親乎庭芝姊為寜王妃以此論之猶不可然莫有他事俾其全活否卿但言之於是具以前事上聞由是特原其罪鄴侯始奏上密使中官夜乘傳陜州問之竇奏其事德宗曰曩言黃中君葢指於朕未知呼卿為􅄦谷子何也或云李相先代靈城在清谷前濁谷後恐以此言之續坤蹶馬咸通乾符中京師醫者續坤坤官為都水使者頗得秦和之術評脉知吉凶休咎至於得失時日皆可預言古者善醫道多矣迹其前亊不過視徹膏肓心觧分劑未聞乎評診脉候見於蓍龜之能也適有燕中奏事大將暴得風􅐄衆醫無不療之不瘳舁疾請坤投藥數服而愈所酬金帛甚多仍以邉馬一疋留贈馬之骨相甚竒然歩驟多蹶雖制以銜勒加之鞭策而欵段之性竟莫能改坤以浪費芻粟託人以賤價賣之求駿者纔試遂復如初累月不售隣伍間有王生貿易於中貴之門頗甚貧窶忽詣坤云有青州監軍將發須鞍馬以備行李亦知馳騁非駿但欲致於牽控之間坤直以無用之畜付焉亦不約鬻馬之價王生經旬不至謂其脱畧亡逸一旦復來且輸十萬坤既獲善價因以十千遺之俄見王生易衣裝置僕馬至於奴婢妻子服餙皆鮮㓗或曰王生賣馬金帛縑資幾三四百萬坤甚驚試詢其事王生初不備説坤曰某以無用之畜獲價頗多但驚駑劣之材何以至此乃云初致馬於青社監軍舉足如有羈絆及將還途遇小馬坊中使因遣留試信宿而往不復見焉密詢左右云數日前魏博曽進一馬毛骨大小與此正同聖人常乘打毬駿異未有其偶將到日方遣調習歩驟縈轉如風今則進御數朝所賜之物甚厚王生因大索其價遂以四十萬酬之是以物之逢時亦有㝠數不遇其主則駑驥莫分乃知耨莘野築傅巖未遇良途奚異於此龍待詔相笏丁重相于駙馬附開成中有龍復本者無目善聽聲揣骨每言休咎無不必中凡有象簡竹笏以手捻之必知官祿年壽宋祁𥙷闕有盛名於世搢紳之士靡不傾屬屈指翹足期於貴達時永樂蕭相亦居諫署同日詣之授以所持竹笏復本執蕭相笏良乆置於案上曰宰相笏次至宋𥙷闕笏曰長官笏宋聞之不樂相國曰無慿之言安足介意經月餘同列於中書候見宰相時李朱崖方秉鈞軸威震朝野未見間佇立閑談互有諧謔頃之丞相遽出宋以手板障面笑猶未已朱崖目之㢠廻謂左右曰宋𥙷闕笑某何事聞之者莫不寒心股慄未旬日出為河清縣令歲餘遂終所任其後蕭相楊歴清途自浙西觀察使入判户部未乆乃居廊廟俱如復本之言自咸通乾符已來京國察相者殊多言事適中者甚少愚之所識處士丁重善於相人吉凶屢有奇驗于都尉方判鹽鐵頻有宰弼之耗時路相國秉鈞持權與之不叶一旦重在新昌私第值于公適至路曰某與之賔朋處士垂箔細看此人終作宰相否備陳飲饌留連數刻既去問之曰所見何如重曰入相必矣兼在旬月之内路公笑曰見是帝王密親復作鹽鐵使爾重曰不然請問于之恩澤何如宣宗朝鄭都尉相國曰又安可比乎重曰鄭為宣宗注意久之而竟不為相豈將人事可以斟酌某熟識于侍郎今日見之觀其骨狀真為貴者其次風儀秀整禮貌謙揖如百斛巨器所貯尚空其半安使不受益於祿位哉茍逾月不居廊廟某無復敢至門下路曰處士可謂𢎞逺矣其後浹旬果登台鉉路相國每見朝士大為稱賞由兹聲動京邑車馬造門者甚衆凡有所説其言皆驗後居終南山好事者亦至其所孟才人善歌孟才人善歌有寵於武宗皇帝嬪御之中莫與為比一旦龍體不豫召而問曰我若不諱汝將何之對曰以微眇之身受君王之寵若陛下萬歲之後無復生焉是日俾於御榻前歌河滿子一曲聲調悽切聞者莫不涕零及宫車晏駕哀慟數日而殞禁掖近臣以小棺殯于殿側山陵之際梓宫重莫能舉識者曰得非候才人乎於是輿櫬以殉遂􅉎于端陵之側是歲攻文之士或為賦題或為詩目以為馮媛班姬無以過也所知者張祜有詩云偶因清唱詠歌頻奏入宫中二十春却為一聲河滿子下泉須弔孟才人袁相雪換金縣令李汧公鎭鳳翔有屬邑編甿因耨田得馬蹄金一瓮注漢書武帝詔云往者東嶽見金又有白麟神馬之瑞宜以黃金鑄麟狀以叶瑞應葢鑄金象馬蹄之狀其後民間效之里民送於縣署㳂牒將至府庭宰邑者喜於獲寳欲自以為殊績慮公藏主守不嚴因使置于私室信宿與官吏重開視之則皆為土塊矣瓮金出土之際鄉社悉來觀騐遽為變更靡不驚駭以狀聞於府主議者僉云奸計換之遂遣理曹椽與軍吏數人就鞫案其事獲金之社咸共證焉宰邑者為衆所擠摧沮莫能自白既而詘辱滋甚遂以為易金伏罪詞欵具存未窮𨼆用之所遂令拘繫僕𨽻脅以刑辟或云藏於糞壤或云投於水中紛紜枉撓結成獄具備以詞案上聞汧公覽之愈怒俄而因有筵席停盃語及斯事列坐賔客咸共驚嘆或云效齊人之攫或云有楊震之癖談笑移時以為胠篋穿窬無足訝也時袁相公滋亦在幕中俛首略無詞對李公目之數四曰宰邑非判官親懿乎袁相曰與之無素李曰聞彼之罪何不樂之甚袁相曰某疑此事未了更請相國詳之汧公曰換金之狀極明若言未了當别有見非判官莫探情偽袁相曰諾因俾移獄府中按問乃令閲瓮間得三十五塊詰其初獲者即本質在焉遂於列肆索金鎔寫與塊形相等既成始秤其半已及三百斤矣詢其負擔人力二農工詎中舁至縣境計其負金大數非二人以竹擔可舉明其即路之時金已化為土矣於是羣情大豁宰邑者遂獲清雪汧公歎伏無已每言才智不如其後履歴清途至德宗朝皆為宰相愚嘗聞金寶藏於土偶見者或變其質東都敦化坊有麟迹見於興慶觀殿宇悉皆頹毁咸通中畢相國再令營造基址間得巨瓮皆貯白金理財者與工匠三十三人盡懼為官所取乃輦木梯葢之以候昏黑及夜各以衣物苞裹而歸明旦開之如堅土削成銀鋌所説與此正同郭鄩見窮鬼通事舎人郭鄩罷櫟陽縣尉久不得調窮居京輦委困方甚肹蠁間常有二物狀如猿玃衣以青衣碧衣出入寢興無不相遂凡欲舉意求索必謂與鄩俱往所造之間如礙枳棘匪惟干祿不遂方且病於寒餒親友見之俱為讎隟或厭之以符術或避之於山林如此數年竟莫能絶一夕處於凈室忽來告别云某等承君厄運不相離者久焉今則候曉而行無復至矣鄩既喜其去遂詢所之云世路如某者甚多但人不見耳今之所詣乃勝業坊王氏其家大積金帛將往散之不久當竭鄩復問云彼之聚歛豐盈何以遽令散去云先得計於安品子其餘冰銷霧散而曉鐘忽鳴遂失所在鄩既興盥潄便覺愁憤開豁是日試詣親友無不改觀相接未渉旬於政事堂見宰相自白遂除通事舎人鄩有表弟張生者為金吾衛佐交遊皆豪俠少年騁駿好奇聞之未甚為信知勝業坊王氏於左廣列職其後往伺之王氏潤屋之資幾侔猗頓然為性儉約所費未嘗過分家有姬僕聲樂其間端麗者至多外之炫服冶容造次莫㢠廻其意一旦與賔朋驟過鳴珂曲有婦人靚粧立於門首王氏駐馬遲留喜動顔色因召同列者命酒開筵為歡頗甚時張生預其末密訪於左右即安品子善歌是日歌數曲王氏悉以金綵贈之衆皆訝其廣費自此輿輦資貨日輸其門毎歡洽酒酣略無所恡繇是治生之業漸屬他門未經數年遂至貧匱裴晉公天津橋遇老人裴晉公度微時羇寓洛中常乘蹇驢入皇城方上天津橋時淮西不庭已數年矣有二老人傍橋柱而立語云蔡州用兵日久徴發甚困於人未知何時得平定忽覩裴公驚愕而退有僕者攜書囊後行相去稍逺聞老人云適憂蔡州未平須待此人為將既歸僕者具述其事裴公曰見我龍鍾相戲爾其秋東府鄉薦明年登第及秉鈞衡朝廷議授吳元濟節鉞既而延英候對憲皇以問宰臣裴公奏曰奸臣䟦扈四十餘年聖朝姑務含容葢慮動傷一境未聞歸心効順乃坐據一方若以旄鉞授之翻恐恣其凶逆以陛下聰明神武藩鎭皆願勤王臣請一詔追兵可以平蕩妖孽於是命晉公為淮西節度使興師致討時陳許汴滑三帥先於偃城縣屯軍晉公統精甲五萬㑹之受律鼓行而進直造蔡州城下纔兩月擒賊以獻淮西遂平後入朝居廊廟六拜正司徒為侍中中書令儒風武德振耀古今洎留守洛師毎話天津橋老人之事狄惟謙請雨㑹昌中北都晉陽縣令狄惟謙梁公之後守官清恪有蒲密之政撫綏勤䘏不畏强禦屬州境亢陽渉歴春夏數百里水泉農畝無不耗斁枯竭禱於晉祠者數旬畧無陰曀之兆時有郭天師者本并土女巫少攻符術多行猒勝之道有監軍使將至京師因緣中貴出入宫掖其後軍牒告歸遂以天師為號既而亢旱滋甚闔境莫知所為僉言曰若得天師一到晉祠則災旱不足憂矣惟謙請於主帥主帥難之惟謙曰災厲流行甿庶焦灼若非天師一救萬姓恐無聊生於是主帥親自為請巫者唯而許之惟謙乃具車輿列幡葢迎於私室躬為控馬既至祠所盛設供帳豐㓗飲􅄿自旦及昏磬折於堦庭之下如此者翌日語惟謙曰我為爾飛符于上界請雨已奉天帝之命必在䖍懇至誠三日雨當足矣繇是四郊士庶奔走雲集三夕于兹曾不降雨又曰此土災沴所興亦由縣令無德我為爾再上天請七日方合有雨惟謙引罪於己奉之愈恭俄而又及所期畧無霑霔郭乃驟索馬入州宅惟謙拜留曰天師已為萬姓此來更乞至心祈禱於是勃然而怒罵曰庸瑣官人不知道理天時未肯下雨留我將復奚為惟謙謝曰非敢更煩天師候明旦排比相送耳於是惟謙宿誡左右曰我為巫者所辱豈可復言為官明晨别有指揮汝等或須相稟是非好惡縣令當之及曉伺門未開郭已嚴飭歸騎常供設肴醴一無所施坐於皇堂大恣呵責惟謙曰左道女巫妖惑日久當須斃在兹日焉敢言歸叱左右坐於神前鞭背三十投於潭水祠後有山髙萬千丈遽令設席焚香從吏悉皆放還簮笏立於其上於是合縣駭愕云長官打殺天師馳走者紛紜觀者如堵是時炎旱累月爍石流金晴空萬里略無纖翳祠上忽有片雲如車蓋俄頃漸髙先覆惟謙立所四郊雲物隨之而合雷震數聲甘澤大澍焦原赤野無不滋潤於是士庶數千自山頂擁惟謙而下州將以杖殺巫者初亦怒之既而精誠有感深加嘆異與監軍發表上聞俄有詔書襃奬賜錢五十萬寵賜章服為絳隰二州刺史所理咸有政聲勑書云狄惟謙劇邑良才忠臣華胄覩此天厲將癉下民當請禱於晉祠𩔖投巫於鄴縣曝山椒之畏景事等焚軀起天際之油雲法同翦爪遂使旱風潛息甘澤旋流天心猶鑒於克誠余志豈忘於襃善特頒朱紱俾耀銅章勿替令名更昭殊績王侍中題詩王侍中智興武略英奇初授徐方節制雄才磊落有命世間生之譽幕府既開所辟皆是儒者一旦從事於使院㑹飲與從容賦詩頃之達於王公乃召䕶軍俱至從事乃屏去翰墨但以杯盤迎接良久問之曰適聞判官與諸賢作詩何得見某而罷遽令却取筆硯復以綵牋數十幅散於座衆賓相顧遲疑將俟行觴舉樂復曰本來欲觀製作非以飲酒為意時小吏亦以牋翰置於王公之前從事禮為揖王公曰前某以韜略發迹未嘗留心章句今日陪奉英髦不免亦陳愚懇遂乃引紙援毫頃刻而就云平生弓劒自相隨剛􅀍郎官遣作詩江南花柳從君詠塞北煙塵我自知四座覽之驚嘆無已咸云忠烈詞彩雖曹景宗賀若弼無以加也曹景宗於御座探韻賦詩云去時兒女悲歸來笳鼓競借問路傍人何如霍去病宋帝覽之稱賞無已又隋將賀若弼贈源雄詩云交河驃騎幕合浦伏波營莫使騏驎上無我二人名時文人張祜亦預此筵監軍謂之曰覩兹盛事豈得無言祜即席為詩以獻云古來英傑動寰區武徳文經未有餘王氏柱天勲業外李陵章句右軍書王公覽之笑曰襃餙之詞可謂無所愛惜左右或言曰書生之徒務為諂佞王公叱之曰有人道我惡汝軰又肯否張秀才海内知名篇什豈易得天下人聞且以為王智興樂善矣留駐數月贈行以絹千匹其後移鎮蒲津子晏平仗節靈武四逺多士翕然歸向風烈遺芳迄于今日道流相夏侯譙公張侍郎為河陽烏司徒從事同幕皆至有道士殷九霞來自青城山有知人之鑒烏公問以年壽官祿九霞曰司徒貴極藩服所望者秉持鈞軸建茅土惟在保守勲庸苞貯仁義享福隆厚殊不可涯既而遍問賔僚九霞曰其間必有台輔時烏公器重裴副使應聲曰裴中丞是宰相否九霞曰若以目前人事言之當如尊㫖以某所觀即不在此時夏侯相國為館驛廵官形質低悴烏因戲曰裴副使不作宰相莫是夏侯廵官否對曰司徒所言是矣烏公撫掌而笑曰尊師莫錯否九霞曰某山野之人早修直道無意於名宦金玉葢以所見任直而道耳烏公曰如此則非某所知也然其次貴達者為誰曰張支使雖不居廊廟履清途亦至榮顯既出遂造張侍郎所居従容謂曰支使神骨清爽氣韻髙邈若以紱冕累身至於三二十年居於世俗儻能擺脱囂俗相逐學道即三十年内白日昇天某之此行非有塵慮實亦訪尋修眞之士耳然閲人甚多無如支使者張以其言意浮闊但唯之而已將去復來情甚懇至審知張意不㢠廻頗甚嗟惜因留藥數粒并黃紙書一緘而别去云藥數粒服之可以無疾書紀宦途所得每一遷轉密自啓之書窮之辰當復相憶其後譙公顯赫令名再居鼎鉉張果踐朝列出入臺省佩服朱紫廉察數州書載之言靡不詳悉年及三紀時為户部侍郎書之所存葢亦無幾雖名位通顯而齒髮衰退每言道流之事話於親友追想其風莫能及矣華山龍移湫咸通九年春華陰縣南十餘里一夕風雷暴作有龍移湫自逺而至先是崖壠高亞無貯水之所此夕㢠廻從數丈小山從東西直亘南北峯巒草樹一無所傷碧波㢠廻塘湛若疏鑿京洛符旅無不枉道而觀有好事者自輦轂蒲津相率而至車馬不絶逮於累月京城南靈應臺有三娘子湫與崖相近水波澄明莫測深淺每秋風揺落未嘗有草木飄汎其上或覩片葉纎莖必有飛鳥銜而去之祈禱者多致花鈿粉黛及綺羅之𩔖啓祝投之歘然而没乾符初有朝士數人同遊終南山遂及湫所因話靈應之事其間有不信者試以木石投之俄有巨魚躍出波心鱗甲如雪忽有風雨㝠晦車馬幾為暴水所漂邇後人愈敬之莫有敢犯者田膨郎偷玉枕文宗皇帝常持白玉枕徳宗朝于闐國所獻追琢奇巧葢希代之寳置於寢殿帳中一旦忽失所在然而禁衛清密非恩澤嬪御莫能至者珍玩羅列他無所失上驚駭移時下詔於都城索賊密謂樞近及左右廣中尉曰此非外冦入之為盗者當在禁掖茍求之不獲且虞他變一枕誠不足惜卿等衛我皇宫必使罪人斯得不然天子環列自兹無用矣内官惶慄謝罪請以浹旬求捕大懸金帛購求略無尋究之所聖㫖嚴切收繫者漸多坊曲閭巷靡不捜捕有龍武二畨將軍王敬𢎞常蓄小僕年甫十八九神彩俊利使之無往不届敬𢎞曽與流輩於威逺軍㑹宴有侍兒善鼓胡琴四座酒酣因請度曲辭以樂器非妙湏常御手者彈之鐘漏已傳取之不及因起觧帶小僕曰若要琵琶頃刻可至敬𢎞曰禁鼓纔動軍門已鎖尋常汝豈不見何言之謬也既而就飲數廵小僕以繡囊將琵琶而至座客歡笑曰樂器夲相隨所難者惜其妙手南軍去左廣㢠廻復三十里入夜且無行伍既而倐忽往來敬𢎞驚異如失時又捜捕嚴𦂳意以竊盗疑之宴罷及明遽歸其第引而問曰使汝累年不知趫捷如此我聞世有俠客汝莫是否小僕謝曰非有此事但能行爾因言父母俱在蜀中頃年偶至京國今欲却歸鄉里有一事欲以報恩偷枕者已知姓名三數日當令伏罪敬𢎞曰如此即事非等閑因兹令活者不少未知賊在何許可報司存掩獲否小僕曰偷枕者田膨郎也市􅆵軍伍行止不恒勇力過人且善超越茍非伺便折其足雖千兵萬騎亦將奔走自兹再宿候之於望仙門伺便擒之必矣將軍隨某觀之此事仍湏秘密是時渉旬無雨向曉埃塵頗甚車馬踐􅂿人不相見膨郎與少年數軰連臂將入軍門小僕執毬杖擊之歘然已折左足仰而觀之曰我偷枕來不怕他人惟懼於爾既而相值豈復多言於是舁至左軍一欵而伏上喜於得賊又知獲在禁旅引膨郎臨軒詰問具陳常在宫掖往來上曰此乃任俠之流非常竊盗内外囚繫數百於是悉令原之小僕初得膨郎已告敬𢎞歸蜀於是尋之不可但賞敬𢎞而已洛中大水咸通四年秋洛中大水苑囿廬舍靡不淹没厥後香山寺僧云其日將暮見暴水自龍門川北下有如決江海鼓怒之間殷若雷震有二黑牛出於水上掉尾躍空而進衆僧與居人慿髙望之謂城中悉為魚矣俄見定鼎長夏二門隂曀忽開亦有青牛奮躍而出相去約有百歩黑牛奔走而㢠廻向之怒浪驚瀾翕然遂低數丈是夕飄溺尤甚京邑遂至蕭條十餘年間尚未完葺先是皇城守閽者白晝聞五鳳樓中有人歌云天津橋畔火光起魏王堤上看洪水時鄭相國涯留守洛師聞之以為妖妄經月餘從事宴罷夜歸執燭者有火燼遺落騎從纔過煙焰已髙救之不及遂燒其半及潦將興榖洛先漲魏王與月波二堤俱壊乃明閽者之言李朱崖知白令公白中書方居郎署未有知者唯朱崖李相國器之許於搢紳間多所延譽然而資用不充無以祗奉僚友一旦相國遺錢十萬俾為酒肴之備約省閣名士數人尅日同過其第時秋暮隂沈渉旬霖瀝賀拔惎員外求官未遂將欲出京薄遊與白公同年登第羸駒就門告别閽者以方俟朝客乃以他適對之賀拔惎遂駐車留書備述羈遊之意白公覽書歎曰丈夫處世窮逹當有時命茍不才以僥倖取容未足為發身之道豈家蓄美􅄿止邀當路豪貴曩時登第貧交今日閉關不接縱使便無榮顯又安得不愧於懐遽令僕者命賀拔惎囘車遂以杯盤同費俄而所約朝賢聮騎而至閽者具陳賀抜惎從容無不惋愕而去翌日於私第謁見相國詢朝士來者為誰白公對以賔客未至適有同年出京訪别憫其龍鍾委困不忍弃之留飲數杯遂闕祗接既負吹嘘之際甘從譴斥之罪相國稱賞逾時云此事真古人之道由兹貴達所以激勸澆薄不旬月自使下評事先授美官白公以庫部郎中入為翰林學士未逾三載便秉鈞衡其後五鎮藩維再居廊廟蹈義懐仁而終始一致流芳傳素士林美之大中初邊鄙不寜土蕃尤甚恣其倔强宣宗欲致討伐遂於延英殿先問宰臣公首奏興師請為統帥㳂邊藩鎮兵士數萬鼓行而前時犬戎臨陣平川以生騎數千伏藏山谷既而得於諜者遂設奇兵待之有蕃中首帥衣緋茸裘繫寶裝帶所乗白馬駿異無比鋒鏑未交揚鞭出於陣面者數四頻召漢軍鬭將白公誡兵士無得應之俄而駐軍指揮背我師百餘歩而立有潞州小將驍勇善射請快馬彎弧而出連發兩矢皆中其項躍馬而前抽短劒踣於鞍上以手扶挾如鬬敵之狀蕃將士卒但呼譟助之於是脱緋裘觧金帶奪馬而還師旅無不奮勇既大戰沙漠虜陳瓦解土崩乗勝追奔幾及黑山之下所獲駞馬輜重不可勝計束手而降三四千人先是河湟關郡界内在匈奴自此悉為内地宣皇初覽㨗書云我知敏中必殄兇醜白公凱旋與同列宰相進詩云一詔皇城四海頒醜戎無數束身還戍樓吹笛人休戰牧野嘶風馬遽閑河水九盤收數曲隴山千里鎖諸關西邊北塞今無事為報東南夷與蠻馬相植詩云舜德堯仁化犬戎許提河隴欵皇風指揮􅆛武皆神筭開拓乾坤是聖功四帥有征無汗馬七關雖戍已弢弓天留此事還英主不在他年在大中魏相扶詩云蕭關新復萬山川古戍秦原象緯鮮戎虜乞降歸惠化皇威漸􅀍懾腥羶穹廬逺戍煙塵滅神武光揚竹帛傳左袵盡知歌帝澤從兹不更備三邊崔相鉉詩云邉陲萬里注恩波宇宙羣方洽凱歌右地名王爭解辮逺方戎壘盡投戈煙塵永息三秋戍瑞氣遥清九折河共偶聖明千載運更觀俗阜與時和劇談錄卷上
